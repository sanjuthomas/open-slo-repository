<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenSLO Repository</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1>OpenSLO Repository</h1>
      <p>Create, edit, and version OpenSLO documents</p>
    </div>
    <div class="header-actions">
      <span id="auth-status" class="auth-status">Not authenticated</span>
      <button type="button" id="btn-login" class="btn btn-secondary">Sign in</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Documents</h2>
        <button type="button" id="btn-new" class="btn btn-primary btn-sm">New</button>
      </div>
      <div id="document-list" class="document-list"></div>
    </aside>

    <section class="editor-panel">
      <div class="toolbar">
        <div class="toolbar-left">
          <label for="kind-select">Kind</label>
          <select id="kind-select">
            <option value="SLO">SLO</option>
            <option value="SLI">SLI</option>
            <option value="Service">Service</option>
            <option value="DataSource">DataSource</option>
            <option value="AlertPolicy">AlertPolicy</option>
            <option value="AlertCondition">AlertCondition</option>
            <option value="AlertNotificationTarget">AlertNotificationTarget</option>
          </select>
          <button type="button" id="btn-template" class="btn btn-secondary btn-sm">Load template</button>
        </div>
        <div class="toolbar-right">
          <span id="doc-meta" class="doc-meta"></span>
          <button type="button" id="btn-validate" class="btn btn-secondary">Validate</button>
          <button type="button" id="btn-save" class="btn btn-primary" disabled>Save</button>
        </div>
      </div>

      <div id="status-banner" class="status-banner hidden"></div>

      <div class="editor-container">
        <textarea id="yaml-editor"></textarea>
      </div>

      <div class="versions-panel">
        <h3>Version history</h3>
        <div id="version-list" class="version-list">
          <p class="muted">Select or save a document to view versions.</p>
        </div>
      </div>
    </section>
  </main>

  <dialog id="login-dialog">
    <form method="dialog" id="login-form">
      <h2>Sign in</h2>
      <p class="muted">Default credentials are in <code>application.properties</code>.</p>
      <label>Username<input type="text" id="login-username" autocomplete="username" required></label>
      <label>Password<input type="password" id="login-password" autocomplete="current-password" required></label>
      <div class="dialog-actions">
        <button type="button" id="login-cancel" class="btn btn-secondary">Cancel</button>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </div>
    </form>
  </dialog>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/yaml/yaml.min.js"></script>
  <script src="/js/templates.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
